<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: warm dark rounded square -->
  <rect width="512" height="512" rx="80" fill="#1a1210"/>

  <!-- Thin-section outer ring -->
  <circle cx="256" cy="240" r="174" fill="#211a13" stroke="#c9a84c" stroke-width="11"/>

  <!-- Crossed-polarizer hairlines -->
  <line x1="82"  y1="240" x2="430" y2="240" stroke="#c9a84c" stroke-width="3.5" opacity="0.38"/>
  <line x1="256" y1="66"  x2="256" y2="414" stroke="#c9a84c" stroke-width="3.5" opacity="0.38"/>

  <!-- Four crystal extinction sectors (alternating brightness) -->
  <path d="M256 240 L256 66  A174 174 0 0 1 430 240 Z" fill="#c9a84c" opacity="0.072"/>
  <path d="M256 240 L430 240 A174 174 0 0 1 256 414 Z" fill="#c9a84c" opacity="0.030"/>
  <path d="M256 240 L256 414 A174 174 0 0 1 82  240 Z" fill="#c9a84c" opacity="0.072"/>
  <path d="M256 240 L82  240 A174 174 0 0 1 256 66  Z" fill="#c9a84c" opacity="0.030"/>

  <!-- PG monogram -->
  <text
    x="256" y="258"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="152"
    font-weight="700"
    fill="#c9a84c"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-4"
  >PG</text>

  <!-- Scale bar accent (references the app's core feature) -->
  <g transform="translate(256, 458)">
    <rect x="-46" y="-3.5" width="92" height="7" rx="3.5" fill="#c9a84c" opacity="0.82"/>
    <rect x="-50" y="-10"  width="7"  height="20" rx="2"   fill="#c9a84c" opacity="0.82"/>
    <rect x="43"  y="-10"  width="7"  height="20" rx="2"   fill="#c9a84c" opacity="0.82"/>
  </g>
</svg>
